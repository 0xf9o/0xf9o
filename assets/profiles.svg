<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120" width="100%" height="120">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#04060a" />
      <stop offset="100%" stop-color="#0d1117" />
    </linearGradient>
    
    <!-- Red Glow Filter (THM) -->
    <filter id="glow-red" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Green Glow Filter (HTB) -->
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Grid Pattern -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" rx="8" />
  <rect width="100%" height="100%" fill="url(#grid)" rx="8" />
  <rect x="5" y="5" width="790" height="110" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1" rx="8" />

  <!-- TryHackMe Section -->
  <g transform="translate(30, 20)">
    <rect width="345" height="80" fill="#0d131f" fill-opacity="0.6" stroke="#ff4136" stroke-opacity="0.3" stroke-width="1.5" rx="6" />
    <!-- THM Red Accent Corner -->
    <path d="M 5 15 L 5 5 L 15 5" fill="none" stroke="#ff4136" stroke-width="2" filter="url(#glow-red)" />
    <!-- Platform Name -->
    <text x="25" y="32" font-family="monospace" font-size="14" font-weight="bold" fill="#ff4136" filter="url(#glow-red)">TRYHACKME</text>
    <!-- Profile Username -->
    <text x="25" y="58" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#ffffff">F9o</text>
    <!-- Custom status -->
    <text x="320" y="47" font-family="monospace" font-size="12" fill="#ff4136" text-anchor="end" filter="url(#glow-red)">[ ACTIVE ]</text>
  </g>

  <!-- HackTheBox Section -->
  <g transform="translate(425, 20)">
    <rect width="345" height="80" fill="#0d131f" fill-opacity="0.6" stroke="#9fef00" stroke-opacity="0.3" stroke-width="1.5" rx="6" />
    <!-- HTB Green Accent Corner -->
    <path d="M 5 15 L 5 5 L 15 5" fill="none" stroke="#9fef00" stroke-width="2" filter="url(#glow-green)" />
    <!-- Platform Name -->
    <text x="25" y="32" font-family="monospace" font-size="14" font-weight="bold" fill="#9fef00" filter="url(#glow-green)">HACKTHEBOX</text>
    <!-- Profile Username -->
    <text x="25" y="58" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#ffffff">5wii</text>
    <!-- Custom status -->
    <text x="320" y="47" font-family="monospace" font-size="12" fill="#9fef00" text-anchor="end" filter="url(#glow-green)">[ ACTIVE ]</text>
  </g>
</svg>
