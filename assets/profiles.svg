<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 130" width="100%" height="130">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#04060a" />
      <stop offset="100%" stop-color="#0d1117" />
    </linearGradient>
    
    <!-- Red Glow Filter (THM) -->
    <filter id="glow-red" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Green Glow Filter (HTB) -->
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- White Glow Filter (X) -->
    <filter id="glow-white" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Grid Pattern -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" rx="8" />
  <rect width="100%" height="100%" fill="url(#grid)" rx="8" />
  <rect x="5" y="5" width="790" height="120" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1" rx="8" />

  <!-- TryHackMe Section (Card 1) -->
  <g transform="translate(20, 20)">
    <rect width="240" height="90" fill="#0d131f" fill-opacity="0.6" stroke="#ff4136" stroke-opacity="0.3" stroke-width="1.5" rx="6" />
    <path d="M 5 15 L 5 5 L 15 5" fill="none" stroke="#ff4136" stroke-width="2" filter="url(#glow-red)" />
    
    <!-- Shield Icon (TryHackMe) -->
    <g transform="translate(15, 13) scale(0.66)">
      <path d="M12 2L2 5v6c0 5.52 4.48 10 10 10s10-4.48 10-10V5l-10-3zm0 18c-4.41 0-8-3.59-8-8V6.3l8-2.4 8 2.4V12c0 4.41-3.59 8-8 8z" fill="#ff4136" filter="url(#glow-red)" />
    </g>
    
    <!-- Title -->
    <text x="36" y="25" font-family="monospace" font-size="11" font-weight="bold" fill="#ff4136" filter="url(#glow-red)">TRYHACKME</text>
    <text x="18" y="60" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#ffffff">F9o</text>
  </g>

  <!-- HackTheBox Section (Card 2) -->
  <g transform="translate(280, 20)">
    <rect width="240" height="90" fill="#0d131f" fill-opacity="0.6" stroke="#9fef00" stroke-opacity="0.3" stroke-width="1.5" rx="6" />
    <path d="M 5 15 L 5 5 L 15 5" fill="none" stroke="#9fef00" stroke-width="2" filter="url(#glow-green)" />
    
    <!-- Cube Icon (HackTheBox) -->
    <g transform="translate(15, 13) scale(0.66)">
      <path d="M12 2L2 7l10 5 10-5-10-5z M2 17l10 5 10-5 M2 12l10 5 10-5" fill="none" stroke="#9fef00" stroke-width="2" filter="url(#glow-green)" />
    </g>
    
    <!-- Title -->
    <text x="36" y="25" font-family="monospace" font-size="11" font-weight="bold" fill="#9fef00" filter="url(#glow-green)">HACKTHEBOX</text>
    <text x="18" y="60" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#ffffff">5wii</text>
  </g>

  <!-- X / Twitter Section (Card 3) -->
  <g transform="translate(540, 20)">
    <rect width="240" height="90" fill="#0d131f" fill-opacity="0.6" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1.5" rx="6" />
    <path d="M 5 15 L 5 5 L 15 5" fill="none" stroke="#ffffff" stroke-width="2" filter="url(#glow-white)" />
    
    <!-- X Logo Icon -->
    <g transform="translate(15, 13) scale(0.66)">
      <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" fill="#ffffff" filter="url(#glow-white)" />
    </g>
    
    <!-- Title -->
    <text x="36" y="25" font-family="monospace" font-size="11" font-weight="bold" fill="#ffffff" filter="url(#glow-white)">X / TWITTER</text>
    <text x="18" y="60" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#ffffff">0xf9o</text>
  </g>
</svg>
