<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="100%" height="260">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#04060a" />
      <stop offset="100%" stop-color="#0d1117" />
    </linearGradient>
    
    <!-- Neon Green Glow Filter -->
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Neon Cyan Glow Filter -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" rx="8" />
  <rect width="100%" height="100%" fill="url(#grid)" rx="8" />
  
  <!-- Outer Border -->
  <rect x="5" y="5" width="790" height="250" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1" rx="8" />
  
  <!-- 4 Skill Panels -->
  
  <!-- 1. Offensive Security Panel -->
  <g transform="translate(20, 20)">
    <rect width="365" height="100" fill="#0d131f" fill-opacity="0.6" stroke="#00ff66" stroke-opacity="0.3" stroke-width="1.5" rx="6" />
    <path d="M 5 15 L 5 5 L 15 5" fill="none" stroke="#00ff66" stroke-width="2" filter="url(#glow-green)" />
    <!-- Title -->
    <text x="20" y="30" font-family="monospace" font-size="14" font-weight="bold" fill="#00ff66" filter="url(#glow-green)">OFFENSIVE SECURITY</text>
    <!-- Bullet points -->
    <text x="20" y="55" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff" fill-opacity="0.85">> Active Directory Exploitation</text>
    <text x="20" y="72" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff" fill-opacity="0.85">> Adversary &amp; Threat Simulation</text>
    <text x="20" y="89" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff" fill-opacity="0.85">> Reverse Engineering &amp; Payload Dev</text>
  </g>
  
  <!-- 2. DevOps & Infrastructure Panel -->
  <g transform="translate(415, 20)">
    <rect width="365" height="100" fill="#0d131f" fill-opacity="0.6" stroke="#00e5ff" stroke-opacity="0.3" stroke-width="1.5" rx="6" />
    <path d="M 5 15 L 5 5 L 15 5" fill="none" stroke="#00e5ff" stroke-width="2" filter="url(#glow-cyan)" />
    <!-- Title -->
    <text x="20" y="30" font-family="monospace" font-size="14" font-weight="bold" fill="#00e5ff" filter="url(#glow-cyan)">DEVOPS &amp; INFRASTRUCTURE</text>
    <!-- Bullet points -->
    <text x="20" y="55" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff" fill-opacity="0.85">> Kubernetes &amp; Docker Orchestration</text>
    <text x="20" y="72" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff" fill-opacity="0.85">> Terraform &amp; Infrastructure as Code</text>
    <text x="20" y="89" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff" fill-opacity="0.85">> Secure CI/CD Pipelines &amp; GitOps</text>
  </g>
  
  <!-- 3. OT & ICS Security Panel -->
  <g transform="translate(20, 140)">
    <rect width="365" height="100" fill="#0d131f" fill-opacity="0.6" stroke="#00e5ff" stroke-opacity="0.3" stroke-width="1.5" rx="6" />
    <path d="M 5 15 L 5 5 L 15 5" fill="none" stroke="#00e5ff" stroke-width="2" filter="url(#glow-cyan)" />
    <!-- Title -->
    <text x="20" y="30" font-family="monospace" font-size="14" font-weight="bold" fill="#00e5ff" filter="url(#glow-cyan)">OT &amp; ICS SECURITY</text>
    <!-- Bullet points -->
    <text x="20" y="55" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff" fill-opacity="0.85">> Cyber-Physical System Audits</text>
    <text x="20" y="72" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff" fill-opacity="0.85">> Industrial Networks &amp; SCADA Security</text>
    <text x="20" y="89" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff" fill-opacity="0.85">> Hardware &amp; Embedded Device Exploitation</text>
  </g>
  
  <!-- 4. Languages & Software Development Panel -->
  <g transform="translate(415, 140)">
    <rect width="365" height="100" fill="#0d131f" fill-opacity="0.6" stroke="#00ff66" stroke-opacity="0.3" stroke-width="1.5" rx="6" />
    <path d="M 5 15 L 5 5 L 15 5" fill="none" stroke="#00ff66" stroke-width="2" filter="url(#glow-green)" />
    <!-- Title -->
    <text x="20" y="30" font-family="monospace" font-size="14" font-weight="bold" fill="#00ff66" filter="url(#glow-green)">LANGUAGES &amp; DEVELOPMENT</text>
    <!-- Bullet points -->
    <text x="20" y="55" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff" fill-opacity="0.85">> Python, Go, Bash, C++, Rust</text>
    <text x="20" y="72" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff" fill-opacity="0.85">> Next.js, TypeScript, React</text>
    <text x="20" y="89" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff" fill-opacity="0.85">> PostgreSQL, SQL, Database Management</text>
  </g>
</svg>
