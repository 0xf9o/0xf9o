<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="250">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#04060a" />
      <stop offset="100%" stop-color="#0d1117" />
    </linearGradient>
    
    <!-- Neon Green Glow Filter -->
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Neon Cyan Glow Filter -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="25" height="25" patternUnits="userSpaceOnUse">
      <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" rx="8" />
  <rect width="100%" height="100%" fill="url(#grid)" rx="8" />
  
  <!-- Outer glowing border lines -->
  <path d="M 10 10 L 790 10 L 790 240 L 10 240 Z" fill="none" stroke="#00ff66" stroke-opacity="0.15" stroke-width="2" rx="8" />
  
  <!-- Cyber Corner accents -->
  <path d="M 10 35 L 10 10 L 35 10" fill="none" stroke="#00ff66" stroke-width="3" filter="url(#glow-green)" />
  <path d="M 790 35 L 790 10 L 765 10" fill="none" stroke="#00ff66" stroke-width="3" filter="url(#glow-green)" />
  <path d="M 10 215 L 10 240 L 35 240" fill="none" stroke="#00ff66" stroke-width="3" filter="url(#glow-green)" />
  <path d="M 790 215 L 790 240 L 765 240" fill="none" stroke="#00ff66" stroke-width="3" filter="url(#glow-green)" />

  <!-- Abstract Tech Line Graphics -->
  <path d="M 30 190 H 200 L 220 210 H 770" fill="none" stroke="#00e5ff" stroke-width="1" stroke-opacity="0.3" filter="url(#glow-cyan)" />
  <circle cx="30" cy="190" r="3" fill="#00e5ff" filter="url(#glow-cyan)" />
  <circle cx="770" cy="210" r="3" fill="#00e5ff" filter="url(#glow-cyan)" />
  
  <!-- Main Title -->
  <text x="50%" y="105" font-family="monospace, Courier New" font-size="52" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="10" filter="url(#glow-green)">0XF9O</text>
  
  <!-- Glowing Overlay for Main Title -->
  <text x="50%" y="105" font-family="monospace, Courier New" font-size="52" font-weight="900" fill="#00ff66" text-anchor="middle" letter-spacing="10" fill-opacity="0.3" filter="url(#glow-green)">0XF9O</text>
  
  <!-- Subtitle -->
  <text x="50%" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#00e5ff" text-anchor="middle" letter-spacing="3" filter="url(#glow-cyan)">OFFENSIVE SECURITY &amp; DEVSECOPS</text>
  
  <!-- Diagnostic details in corner -->
  <text x="35" y="40" font-family="monospace" font-size="11" fill="#ffffff" fill-opacity="0.3">LOC: [c:\Users\MSI-dev\Desktop\0xf9o]</text>
  <text x="35" y="55" font-family="monospace" font-size="11" fill="#ffffff" fill-opacity="0.3">STATUS: SECURE_CONNECTION_ESTABLISHED</text>
  <text x="765" y="40" font-family="monospace" font-size="11" fill="#00ff66" text-anchor="end" filter="url(#glow-green)">VER: 3.0.0</text>
</svg>
